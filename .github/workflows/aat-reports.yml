name: AAT Reports
on:
  workflow_call:
    outputs:
      aat:
        value: ${{ jobs.aat.result }}

concurrency:
  group: aat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Set up turbo cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-storybook-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-storybook-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Build storybook
        run: npx turbo run build:storybook --filter=@primer/react
      - name: Upload storybook
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: storybook-static-aat-react
          path: packages/react/storybook-static/**
          include-hidden-files: true
          retention-days: 1

  aat-runner:
    needs: build-storybook
    runs-on: aat-runner
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download storybook
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: storybook-static-aat-react
          path: packages/react/storybook-static
      - name: Run storybook
        id: storybook
        working-directory: packages/react
        run: |
          npx serve -l 6006 storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
          curl --retry 30 --retry-delay 1 --retry-connrefused --silent --show-error --fail http://localhost:6006 >/dev/null
      - name: Run AAT
        uses: docker://mcr.microsoft.com/playwright:v1.60.0-jammy
        env:
          STORYBOOK_URL: 'http://172.17.0.1:6006'
        with:
          args: npx playwright test --grep @aat --workers=100% --shard="${{ matrix.shard }}/${{ strategy.job-total }}"
      - name: Stop storybook
        if: ${{ always() }}
        run: kill ${{ steps.storybook.outputs.pid }} || true
      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aat-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: error
          retention-days: 1

  aat:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [build-storybook, aat-runner]
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
      - name: download all reports
        if: ${{ needs.aat-runner.result == 'success' || needs.aat-runner.result == 'failure' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: all-blob-reports
          pattern: aat-*
          merge-multiple: true
      - name: merge all reports
        if: ${{ needs.aat-runner.result == 'success' || needs.aat-runner.result == 'failure' }}
        run: npx --yes playwright@1.60.0 merge-reports --reporter html ./all-blob-reports
      - name: Upload report
        if: ${{ needs.aat-runner.result == 'success' || needs.aat-runner.result == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aat
          path: playwright-report
          if-no-files-found: error
      - name: Check build-storybook job status
        if: ${{ needs.build-storybook.result != 'success' }}
        run: exit 1
      - name: Check aat-runner job status
        if: ${{ needs.aat-runner.result != 'success' }}
        run: exit 1
