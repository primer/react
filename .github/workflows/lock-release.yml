name: Toggle Release Lock

on:
  release:
    types:
      - released
      - prereleased
  workflow_dispatch:
    inputs:
      action:
        description: 'Lock or unlock the release?'
        required: true
        type: choice
        options:
          - lock
          - unlock

jobs:
  lock:
    if: ${{ github.event.inputs.action == 'lock' }}
    name: Lock the release
    runs-on: ubuntu-latest
    steps:
      - name: Get App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        id: app-token
        with:
          app-id: ${{ vars.PRIMER_APP_ID_SHARED }}
          owner: primer
          repositories: react
          private-key: ${{ secrets.PRIMER_APP_PRIVATE_KEY_SHARED }}
      - name: Lock main branch
        run: |
          # Lock main but allow react-release-conductor team to push
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/primer/react/branches/main/protection \
            --input - <<EOF
          {
            "lock_branch": true,
            "restrictions": {
              "teams": ["react-release-conductor"],
              "users": []
            },
            "required_status_checks": null,
            "enforce_admins": true,
            "required_pull_request_reviews": null
          }
          EOF
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  unlock:
    if: ${{ github.event.inputs.action == 'unlock' || github.event.action == 'released' || github.event.action == 'prereleased' }}
    name: Unlock the release
    runs-on: ubuntu-latest
    steps:
      - name: Get App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        id: app-token
        with:
          app-id: ${{ vars.PRIMER_APP_ID_SHARED }}
          owner: primer
          repositories: react
          private-key: ${{ secrets.PRIMER_APP_PRIVATE_KEY_SHARED }}
      - name: Unlock main branch
        run: |
          # Delete the branch protection rule entirely.
          # Note: This workflow is the only thing using legacy branch protection.
          # All other branch rules use rulesets, which are unaffected by this delete.
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/primer/react/branches/main/protection
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
