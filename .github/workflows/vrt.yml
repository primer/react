name: vrt
on:
  pull_request:
    types:
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-snapshots:
    if: contains(github.event.pull_request.labels.*.name, 'update snapshots')
    runs-on: ubuntu-latest
    steps:
      - name: Save Pull Request info
        run: |
          mkdir PR
          echo $NUMBER > ./PR/number
        env:
          NUMBER: ${{ github.event.number }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pull-request
          path: ./PR
          retention-days: 1

  upload-snapshots:
    needs: update-snapshots
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Set up turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-shard-${{ matrix.shard }}-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Build storybook
        run: npx turbo run build:storybook
      - name: Run storybook
        id: storybook
        run: |
          npx serve -l 6006 packages/react/storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
          sleep 5
      - name: Run styled-react storybook
        id: styled-react-storybook
        run: |
          npx serve -l 6007 packages/styled-react/storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
          sleep 5
      - name: Run VRT
        uses: docker://mcr.microsoft.com/playwright:v1.60.0-jammy
        env:
          STORYBOOK_URL: 'http://172.17.0.1:6006'
          STYLED_REACT_STORYBOOK_URL: 'http://172.17.0.1:6007'
        with:
          args: npx playwright test --grep @vrt --update-snapshots --shard="${{ matrix.shard }}/${{ strategy.job-total }}"
      - name: List pull request files
        uses: actions/github-script@5c56fde4671bc2d3592fb0f2c5b5bab9ddae03b1
        with:
          script: |
            const fs = require('fs');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            fs.writeFileSync('pull-request-files.txt', files.map((file) => file.filename).join('\n'));
      - name: Stop storybook
        run: kill ${{ steps.storybook.outputs.pid }}
      - name: Stop styled-react storybook
        run: kill ${{ steps.styled-react-storybook.outputs.pid }}
      - name: Create snapshots.zip
        run: |
          git ls-files --others --exclude-standard --modified > updated-files.txt

          if [[ ! -s updated-files.txt ]]; then
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');

          function readLines(path) {
            return fs.readFileSync(path, 'utf8').split(/\r?\n/).filter(Boolean);
          }

          const changedFiles = readLines('pull-request-files.txt');
          const updatedFiles = readLines('updated-files.txt');
          const snapshotPrefixes = new Set();

          function addSnapshotPrefixForTest(testName) {
            snapshotPrefixes.add(`.playwright/snapshots/components/${testName}.test.ts-snapshots/`);
          }

          function addSnapshotPrefixForExistingSnapshot(file) {
            const marker = '.test.ts-snapshots/';
            const index = file.indexOf(marker);

            if (file.startsWith('.playwright/snapshots/') && index !== -1) {
              snapshotPrefixes.add(file.slice(0, index + marker.length));
            }
          }

          const sourceMappings = new Map([
            ['packages/react/src/ActionBar/', 'drafts/ActionBar'],
            ['packages/react/src/Skeleton/', 'Skeletons'],
            ['packages/react/src/SkeletonAvatar/', 'Skeletons'],
            ['packages/react/src/SkeletonText/', 'Skeletons'],
            ['packages/react/src/deprecated/ActionList/', 'ActionList'],
            ['packages/react/src/deprecated/DialogV1/', 'Dialogv1'],
            ['packages/react/src/deprecated/FilteredSearch/', 'FilteredSearch'],
            ['packages/react/src/deprecated/UnderlineNav/', 'UnderlineNav--deprecated'],
            ['packages/react/src/experimental/IssueLabel/', 'IssueLabel'],
            ['packages/react/src/experimental/SelectPanel2/', 'SelectPanel'],
            ['packages/react/src/experimental/UnderlinePanels/', 'UnderlinePanels'],
          ]);

          const broadSnapshotChanges = [
            '.github/workflows/vrt',
            'e2e/matchers/',
            'e2e/test-helpers/',
            'packages/react/src/BaseStyles/',
            'packages/react/src/FeatureFlags/',
            'packages/react/src/hooks/',
            'packages/react/src/internal/',
            'packages/react/src/legacy-theme/',
            'packages/react/src/stories/',
            'packages/react/src/utils/',
            'playwright.config.ts',
          ];

          const excludedSourceDirectories = new Set([
            '__tests__',
            'deprecated',
            'experimental',
            'hooks',
            'internal',
            'legacy-theme',
            'live-region',
            'next',
            'stories',
            'utils',
          ]);

          function addSnapshotPrefixForSource(file) {
            if (!file.startsWith('packages/react/src/')) {
              return;
            }

            for (const [sourcePrefix, testName] of sourceMappings) {
              if (file.startsWith(sourcePrefix)) {
                addSnapshotPrefixForTest(testName);
                return;
              }
            }

            const [directory] = file.slice('packages/react/src/'.length).split('/');

            if (directory && !excludedSourceDirectories.has(directory)) {
              addSnapshotPrefixForTest(directory);
            }
          }

          const shouldUploadAllSnapshots = changedFiles.some((file) => {
            return broadSnapshotChanges.some((prefix) => file === prefix || file.startsWith(prefix));
          });

          for (const file of changedFiles) {
            addSnapshotPrefixForExistingSnapshot(file);

            if (file.startsWith('e2e/components/') && file.endsWith('.test.ts')) {
              addSnapshotPrefixForTest(file.slice('e2e/components/'.length, -'.test.ts'.length));
            }

            addSnapshotPrefixForSource(file);
          }

          const snapshotsToUpload = updatedFiles.filter((file) => {
            if (!file.startsWith('.playwright/snapshots/')) {
              return false;
            }

            if (shouldUploadAllSnapshots) {
              return true;
            }

            return [...snapshotPrefixes].some((prefix) => file.startsWith(prefix));
          });

          const ignoredSnapshots = updatedFiles.filter((file) => {
            return file.startsWith('.playwright/snapshots/') && !snapshotsToUpload.includes(file);
          });

          console.log(`Uploading ${snapshotsToUpload.length} snapshot file(s).`);

          if (ignoredSnapshots.length > 0) {
            console.log(`Ignoring ${ignoredSnapshots.length} unrelated snapshot file(s):`);
            for (const file of ignoredSnapshots) {
              console.log(file);
            }
          }

          fs.writeFileSync('snapshots-to-upload.txt', snapshotsToUpload.join('\n') + (snapshotsToUpload.length ? '\n' : ''));
          NODE

          if [[ -s snapshots-to-upload.txt ]]; then
            zip snapshots -@ < snapshots-to-upload.txt
          fi
      - name: Upload snapshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: snapshots-${{ matrix.shard }}
          path: snapshots.zip
          retention-days: 1
          if-no-files-found: ignore
