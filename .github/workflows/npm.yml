name: npm
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Set up turbo cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-default-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-default-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Pack public packages
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const directory = path.resolve('packed');
            fs.mkdirSync(directory, {recursive: true});

            core.startGroup('Packing npm packages');

            const {stdout: queryOutput} = await exec.getExecOutput('pnpm', ['--silent', 'list', '--recursive', '--depth', '-1', '--json']);
            const workspaces = JSON.parse(queryOutput);
            const packages = workspaces.filter(pkg => pkg.private !== true && pkg.name !== undefined).map(pkg => pkg.name);
            core.info(`Packing: ${packages.join(' ')}`);

            const args = ['--pack-destination', directory, '--json'];
            const results = [];
            for (const name of packages) {
              const {stdout} = await exec.getExecOutput('pnpm', ['--filter', name, 'pack', ...args]);
              const result = JSON.parse(stdout);
              results.push(...(Array.isArray(result) ? result : [result]));
            }
            const packOutput = JSON.stringify(results);
            const result = JSON.parse(packOutput);

            core.endGroup();

            const metadata = {
              packages: result.map(pkg => ({
                name: pkg.name,
                version: pkg.version,
                path: path.relative(process.cwd(), pkg.filename),
              })),
            };

            fs.writeFileSync(path.join(directory, 'metadata.json'), JSON.stringify(metadata, null, 2));

            core.info(JSON.stringify(metadata, null, 2));
      - name: Upload packed npm packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-packages
          path: |
            packed/*.tgz
            packed/metadata.json
          if-no-files-found: error
