name: VRT Reports
on:
  workflow_call:
    outputs:
      vrt:
        value: ${{ jobs.vrt.result }}

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Set up turbo cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-storybook-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-storybook-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Build storybook
        run: npx turbo run build:storybook
      - name: Upload react storybook
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: storybook-static-vrt-react
          path: packages/react/storybook-static/**
          include-hidden-files: true
          retention-days: 1
      - name: Upload styled-react storybook
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: storybook-static-vrt-styled-react
          path: packages/styled-react/storybook-static/**
          include-hidden-files: true
          retention-days: 1

  vrt-runner:
    needs: build-storybook
    runs-on: vrt-runner
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download react storybook
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: storybook-static-vrt-react
          path: packages/react/storybook-static
      - name: Download styled-react storybook
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: storybook-static-vrt-styled-react
          path: packages/styled-react/storybook-static
      - name: Run storybook
        id: storybook
        working-directory: packages/react
        run: |
          npx serve -l 6006 storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
          curl --retry 30 --retry-delay 1 --retry-connrefused --silent --show-error --fail http://localhost:6006 >/dev/null
      - name: Run styled-react storybook
        id: styled-react-storybook
        run: |
          npx serve -l 6007 packages/styled-react/storybook-static &
          pid=$!
          echo "pid=$pid" >> $GITHUB_OUTPUT
          curl --retry 30 --retry-delay 1 --retry-connrefused --silent --show-error --fail http://localhost:6007 >/dev/null
      - name: Run VRT
        uses: docker://mcr.microsoft.com/playwright:v1.60.0-jammy
        env:
          STORYBOOK_URL: 'http://172.17.0.1:6006'
          STYLED_REACT_STORYBOOK_URL: 'http://172.17.0.1:6007'
        with:
          args: npx playwright test --grep @vrt --shard="${{ matrix.shard }}/${{ strategy.job-total }}"
      - name: Stop storybook
        if: ${{ always() }}
        run: kill ${{ steps.storybook.outputs.pid }} || true
      - name: Stop styled-react storybook
        if: ${{ always() }}
        run: kill ${{ steps.styled-react-storybook.outputs.pid }} || true
      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vrt-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  vrt:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [build-storybook, vrt-runner]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          cache: 'npm'
      - name: install dependencies
        run: npm ci
      - name: download all reports
        if: ${{ needs.vrt-runner.result == 'success' || needs.vrt-runner.result == 'failure' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: all-blob-reports
          pattern: vrt-*
          merge-multiple: true
      - name: merge all reports
        if: ${{ needs.vrt-runner.result == 'success' || needs.vrt-runner.result == 'failure' }}
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload report
        if: ${{ needs.vrt-runner.result == 'success' || needs.vrt-runner.result == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vrt
          path: playwright-report
          if-no-files-found: error
      - name: check build-storybook job status
        if: ${{ needs.build-storybook.result != 'success' }}
        run: exit 1
      - name: check vrt-runner job status
        if: ${{ needs.vrt-runner.result != 'success' }}
        run: exit 1
