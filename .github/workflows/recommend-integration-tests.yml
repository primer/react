name: Recommend integration tests
on:
  pull_request:

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  recommend:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'

      - name: Get source files changes
        id: source-files
        run: |
          DIFF=$(git diff --name-only origin/main | grep 'packages/react' | grep -Ev '.stories.tsx|.stories.module.css|.docs.json' || true)
          if [ -z "$DIFF" ]; then
            echo "diff=" >> $GITHUB_OUTPUT
          else
            echo "diff=true" >> $GITHUB_OUTPUT
          fi

      - name: Has diff?
        run: echo ${{ steps.source-files.outputs.diff != '' }}

      - name: Add label and comment
        id: integration-tests
        if: ${{ steps.source-files.outputs.diff != '' }}
        uses: actions/github-script@5c56fde4671bc2d3592fb0f2c5b5bab9ddae03b1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const INTEGRATION_LABEL_NAMES = {
              // synced with https://github.com/primer/react/labels?q=integration-tests
              skipped: 'integration-tests: skipped manually',
              recommended: 'integration-tests: recommended',
              failing: 'integration-tests: failing',
              passing: 'integration-tests: passing'
            }

            const issue = {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            }

            const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, issue);
            const integrationLabels = labels.filter(label => label.name.startsWith('integration-tests'))
            const hasSkippedLabel = integrationLabels.find(label => label.name === INTEGRATION_LABEL_NAMES.skipped)
            const hasPassingLabel = integrationLabels.find(label => label.name === INTEGRATION_LABEL_NAMES.passing)

            if (hasSkippedLabel) {
              core.info('Integration tests were skipped manually')
              core.setOutput('should-run', 'false')
              return
            }

            core.setOutput('should-run', 'true')

            if (integrationLabels.length === 0) {
              // recommend integration tests
              await github.rest.issues.addLabels({...issue, labels: [INTEGRATION_LABEL_NAMES.recommended]})
              await github.rest.issues.createComment({
                ...issue,
                body: '<!-- recommend-integration-tests.yml -->\n\n # ⚠️ Action required \n\n :wave: Hi, this pull request contains changes to the source code that github/github-ui depends on. If you are GitHub staff, test these changes with github/github-ui using the [integration workflow](https://github.com/github/github-ui/actions/workflows/primer-npm-packages-integration.yml). If this doesn\'t work, you can also use the original workflow [here](https://github.com/github/github-ui/actions/workflows/primer-react-pr-test.yml). Check the [integration testing docs](https://gh.io/testing_primer_at_dotcom) for step-by-step instructions. Or, apply the `integration-tests: skipped manually` label to skip these checks.\n\nTo publish a canary release for integration testing, apply the `Canary Release` label to this PR.'
              })
            } else if (hasPassingLabel) {
              // recommend running integration tests again as there are new commits that might change the status
              // note: we don't remove 'integration-tests: passing' label because this is only a suggestion/nudge
              await github.rest.issues.addLabels({...issue, labels: [INTEGRATION_LABEL_NAMES.recommended]})
              await github.rest.issues.createComment({
                ...issue,
                body: '<!-- recommend-integration-tests.yml -->\n\n # ⚠️ Action required \n\n :wave: Hi, there are new commits since the last successful integration test. If you are GitHub staff, test these changes with github/github-ui using the [integration workflow](https://github.com/github/github-ui/actions/workflows/primer-npm-packages-integration.yml). If this doesn\'t work, you can also the your original workflow [here](https://github.com/github/github-ui/actions/workflows/primer-react-pr-test.yml). Check the [integration testing docs](https://gh.io/testing_primer_at_dotcom) for step-by-step instructions. Or, apply the `integration-tests: skipped manually` label to skip these checks.'
              })
            }

      - name: Run github-ui integration tests
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.integration-tests.outputs.should-run == 'true' }}
        run: gh workflow run primer-npm-packages-integration.yml -R github/github-ui --ref main --field prc-pr="$PR_NUMBER"
        env:
          # Use GITHUB_TOKEN so this fails closed if Actions cannot access github-ui.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
