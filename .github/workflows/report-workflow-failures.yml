name: Report workflow failures

on:
  workflow_run:
    workflows:
      - Codespaces Prebuilds
    types:
      - completed

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.workflow_id }}

jobs:
  update-issue:
    if: ${{ contains(fromJSON('["failure", "success"]'), github.event.workflow_run.conclusion) }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Update issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const latestRuns = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowRun.workflow_id,
              status: 'completed',
              per_page: 1,
            });
            const latestRun = latestRuns.data.workflow_runs[0];

            if (
              !latestRun ||
              latestRun.id !== workflowRun.id ||
              latestRun.run_attempt !== workflowRun.run_attempt
            ) {
              return;
            }

            const workflow = await github.rest.actions.getWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowRun.workflow_id,
            });
            const title = `Investigate ${workflow.data.name} workflow failure`;
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              },
            );
            const failureIssues = issues.filter(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (workflowRun.conclusion === 'success') {
              for (const issue of failureIssues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
              return;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: workflowRun.id,
                filter: 'latest',
                per_page: 100,
              },
            );
            const failedJobs = jobs.filter((job) => job.conclusion === 'failure');
            const failedJobLinks = failedJobs.map(
              (job) => `[${job.name}](${job.html_url})`,
            );

            if (failedJobLinks.length === 0) {
              failedJobLinks.push(`[Failed run](${workflowRun.html_url})`);
            }

            const body = [
              `- ${workflow.data.name}: ${failedJobLinks.join(', ')}`,
              '',
              '@github/primer-engineering, please investigate and fix.',
            ].join('\n');

            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            };

            if (failureIssues.length > 0) {
              await github.rest.issues.update({
                ...issue,
                issue_number: failureIssues[0].number,
              });
            } else {
              await github.rest.issues.create(issue);
            }
