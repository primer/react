name: Run Copilot on dedupe failure

on:
  workflow_run:
    workflows: [dedupe]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions: {}

jobs:
  run-copilot-on-dedupe-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Start Copilot cloud agent
        env:
          BASE_REF: ${{ github.event.workflow_run.head_branch }}
          # This must be a user-to-server token accepted by the Copilot agent tasks API.
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
          PROMPT: run dedupe
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::COPILOT_AGENT_TOKEN secret is required to start a Copilot cloud agent task"
            exit 1
          fi

          if ! gh api \
            --method POST \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/agents/repos/${REPOSITORY}/tasks" \
            -f "prompt=${PROMPT}" \
            -f "base_ref=${BASE_REF}" \
            -F "create_pull_request=true"
          then
            echo "::error::Failed to start Copilot cloud agent task for dedupe workflow run ${WORKFLOW_RUN_ID}. Check that COPILOT_AGENT_TOKEN is valid, has access to this repository, and can use the Copilot agent tasks API."
            exit 1
          fi
