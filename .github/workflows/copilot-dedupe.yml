name: Run Copilot on dedupe failure

on:
  workflow_run:
    workflows: [dedupe]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions: {}

jobs:
  run-copilot-on-dedupe-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Start Copilot cloud agent
        uses: actions/github-script@5c56fde4671bc2d3592fb0f2c5b5bab9ddae03b1
        env:
          BASE_REF: ${{ github.event.workflow_run.head_branch || github.event.repository.default_branch }}
        with:
          # This must be a user-to-server token with read/write access to actions, contents, issues, and pull requests.
          github-token: ${{ secrets.COPILOT_AGENT_TOKEN }}
          script: |
            await github.request('POST /agents/repos/{owner}/{repo}/tasks', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prompt: 'run dedupe',
              base_ref: process.env.BASE_REF,
              create_pull_request: true,
              headers: {
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
